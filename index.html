<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<link rel="stylesheet" type="text/css" href="style.css">
	<title>Library</title>
</head>
<body>
	<div class="container">
		<div class="library">
			<div>
				<button command="show-modal" commandfor="dialog-book" class="newBook">New Book</button>
			</div>
			<div class="books"></div>
		</div>
		<dialog id="dialog-book">
			<form id="dialogForm">
				<label for="name">Name</label>
				<input type="text" name="name" id="name" required>
				<label for="descriptio">Description</label>
				<input type="text" name="descriptio" id="descriptio" required>
				<label for="autor">Autor</label>
				<input type="text" name="autor" id="autor" required>
				<select name="status">
					<option value="finish">finish</option>
					<option value="pending" selected>pending</option>
				</select>
				<button type="submit">add</button>
			</form>
			<button commandfor="dialog-book" command="close">close</button>
		</dialog>
	</div>
<script src="script.js"></script>
</body>
</html>
